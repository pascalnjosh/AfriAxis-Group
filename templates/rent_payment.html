<h1>Pay Rent via M-Pesa</h1>

{% if message %}
<p style="color: green;"><b>{{ message }}</b></p>
{% endif %}

<p><b>Tenant:</b> {{ rent.tenant_name }}</p>
<p><b>Amount:</b> KES {{ rent.amount }}</p>

<form method="POST">
    {% csrf_token %}
    <input name="phone_number" placeholder="2547XXXXXXXX" required>
    <input name="amount" value="{{ rent.amount }}" required>
    <button type="submit">Send STK Push</button>
</form>

{% if mpesa_response %}
<pre>{{ mpesa_response }}</pre>
{% endif %}
